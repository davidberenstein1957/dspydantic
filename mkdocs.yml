site_name: DSPydantic Documentation
site_description: Auto-optimize your Pydantic models with DSPy
site_author: dspydantic contributors
site_url: https://davidberenstein1957.github.io/dspydantic/

repo_name: davidberenstein1957/dspydantic
repo_url: https://github.com/davidberenstein1957/dspydantic
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            show_if_no_docstring: false
            separate_signature: true
            merge_init_into_class: true
            show_submodules: true
            docstring_options:
              ignore_init_summary: false
  - mkdocs-jupyter:
      execute: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md

  - Tutorials:
    - tutorials/index.md
    - Quickstart: tutorials/quickstart.md
    - Configure a Language Model: tutorials/configure-language-models.md
    - Extract Free-form Text: tutorials/extract-free-form-text.md
    - Extract Structured Data: tutorials/extract-structured-data.md
    - Optimize with Prompt Templates: tutorials/use-prompt-templates.md

  - How-to Guides:
    - how-to/index.md
    - Use Images and PDFs: how-to/use-multimodal-inputs.md
    - Optimize Nested Models: how-to/optimize-nested-models.md
    - Include or Exclude Fields: how-to/include-exclude-fields.md
    - Configure Evaluators: how-to/configure-evaluators.md
    - Build a Custom Evaluator: how-to/build-custom-evaluators.md
    - Configure Optimization Parameters: how-to/configure-optimizations.md
    - Save and Load a Prompter: how-to/save-and-load.md
    - Deploy to Production: how-to/deploy-to-production.md
    - Integrate with Applications: how-to/integrate-with-applications.md

  - Explanation:
    - explanation/index.md
    - Key Concepts: explanation/key-concepts.md
    - How Optimization Works: explanation/how-optimization-works.md
    - Understanding Evaluators: explanation/understanding-evaluators.md
    - Choosing an Evaluator: explanation/choosing-an-evaluator.md
    - Architecture: explanation/architecture.md

  - Reference:
    - reference/index.md
    - Input Formats: reference/input-formats.md
    - Optimizers: reference/optimizers.md
    - Evaluator Selection: reference/evaluator-selection.md
    - API:
      - Prompter: reference/api/prompter.md
      - Types: reference/api/types.md
      - Extractor: reference/api/extractor.md
      - Evaluators: reference/api/evaluators.md
    - Changelog: https://github.com/davidberenstein1957/dspydantic/releases
